name: Upload R2 Release Assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to update
        required: true
        default: 3.2026.621
      base_url:
        description: R2/CDN release asset base URL
        required: true
        default: https://cdn.pansysoft.app/releases

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download and upload mac assets one by one
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          base="${{ inputs.base_url }}"
          mkdir -p release
          assets=(
            "OpenFiles-${version}-arm64-mac.zip"
            "OpenFiles-${version}-mac.zip"
            "OpenFiles-${version}-arm64.dmg"
            "OpenFiles-${version}.dmg"
          )
          for asset in "${assets[@]}"; do
            echo "Downloading ${asset}"
            curl -fL --progress-bar --connect-timeout 30 --max-time 900 --retry 5 --retry-delay 5 --retry-all-errors -o "release/${asset}" "${base}/${asset}"
            ls -lh "release/${asset}"
            echo "Uploading ${asset}"
            gh release upload "${version}" "release/${asset}" --repo "${{ github.repository }}" --clobber
            rm -f "release/${asset}"
          done
